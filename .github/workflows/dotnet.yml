name: .NET Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Restore NuGet packages
      run: |
        dotnet restore MyPanelCarWashing.slnx
        # Если dotnet restore не работает, попробуйте nuget restore
        # nuget restore MyPanelCarWashing.slnx
    
    - name: Build
      run: dotnet build MyPanelCarWashing.slnx --configuration Release --no-restore
    
    - name: Run tests
      run: dotnet test --no-build --verbosity normal