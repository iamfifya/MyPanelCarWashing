name: .NET Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Restore NuGet packages
      run: msbuild MyPanelCarWashing.slnx /t:Restore /p:Configuration=Release
    
    - name: Build
      run: msbuild MyPanelCarWashing.slnx /p:Configuration=Release /p:Platform="Any CPU"